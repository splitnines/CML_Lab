conf t
no crypto pki trustpoint CA-Client
crypto pki trustpoint CA-Client
 enrollment url http://10.1.0.1:80
 serial-number
 fqdn r2.cml.lab
 ip-address 10.2.0.1
 subject-name CN=r2,O=cml.lab
! subject-alt-name r2.cml.lab
! no subject-alt-name
 revocation-check none
 rsakeypair CA-Cert
 hash sha512
exit


crypto pki server CA
 no database archive
 issuer-name cn=CA,O=cml.lab
 grant auto
!
crypto pki trustpoint CA
 revocation-check crl
 rsakeypair CA
 hash sha512
