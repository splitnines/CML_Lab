key = "mysecretkey"

group = admins {
    default service = permit
    service = exec {
        priv-lvl = 15
    }
}

user = cisco {
        member = admins
        login = cleartext "cisco"
}

user = rickey {
        member = admins
        login = cleartext "cisco"
}

accounting file = /var/log/tacacs/tacacs.log
